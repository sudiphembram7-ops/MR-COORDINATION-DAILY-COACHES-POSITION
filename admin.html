<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MR Coach Admin Panel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f4f4;
}
.container{
    max-width:900px;
    margin-top:30px;
}
.card{
    border:2px solid #003366;
}
.card-header{
    background:#003366;
    color:white;
    font-weight:bold;
    font-size:22px;
}
</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="card-header">
MR CO-ORDINATION DAILY COACHES POSITION
</div>

<div class="card-body">

<div class="row">

<div class="col-md-4">
<label>Shop</label>

<select id="shop" class="form-select">
<option>N Shop</option>
<option>M Shop</option>
<option>MR SCR Shop</option>
<option>CR Shop</option>
<option>Lifting Bay</option>
<option>J Shop</option>
</select>
</div>

<div class="col-md-4">
<label>Column</label>

<select id="column" class="form-select">

<option>SCR9</option>
<option>SCR10</option>
<option>SCR11</option>
<option>SCR12</option>
<option>SCR13</option>
<option>SCR14</option>
<option>SCR15</option>
<option>SCR16</option>
<option>SCR18</option>
<option>SCR19</option>
<option>SCR21</option>
<option>SCR22</option>

</select>
</div>

<div class="col-md-4">
<label>Position</label>

<select id="position" class="form-select">
<option>H1</option>
<option>H2</option>
<option>D2</option>
<option>D1</option>
</select>

</div>

</div>

<br>

<div class="row">

<div class="col-md-6">

<label>Coach Number</label>

<input
type="text"
id="coachNo"
class="form-control"
placeholder="Enter Coach Number">

</div>

<div class="col-md-3">

<label>Coach Type</label>

<select
id="coachType"
class="form-select">

<option>LHB AC</option>
<option>LHB NAC</option>
<option>GS</option>
<option>SLR</option>
<option>RCC</option>
<option>NMG</option>

</select>

</div>

<div class="col-md-3">

<label>Status</label>

<select
id="status"
class="form-select">

<option>PO</option>
<option>LM</option>
<option>MED</option>
<option>RL</option>

</select>

</div>

</div>

<br>

<button
class="btn btn-success"
onclick="saveCoach()">

💾 SAVE

</button>

<button
class="btn btn-warning">

✏ UPDATE

</button>

<button
class="btn btn-danger">

🗑 DELETE

</button>

</div>

</div>

</div>

<script>

function saveCoach(){

let coach={

shop:shop.value,

column:column.value,

position:position.value,

coachNo:coachNo.value,

coachType:coachType.value,

status:status.value

};

let data=
JSON.parse(localStorage.getItem("CoachDB"))||[];

data.push(coach);

localStorage.setItem(
"CoachDB",
JSON.stringify(data)
);

alert("Coach Saved Successfully");

}

</script>

</body>
</html>
