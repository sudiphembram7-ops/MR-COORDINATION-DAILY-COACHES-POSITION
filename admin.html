<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MR Coach Admin Panel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f4f4;
}
.container{
    max-width:900px;
    margin-top:30px;
}
.card{
    border:2px solid #003366;
}
.card-header{
    background:#003366;
    color:white;
    font-weight:bold;
    font-size:22px;
}
</style>

</head>

<body>

<div class="container">

<div class="container">

<div class="card">

<div class="card-header bg-primary text-white">

<h3>MR CO-ORDINATION ADMIN PANEL</h3>

</div>

<div class="card-body">

<div class="row">

<div class="col-md-4">

<label>Shop</label>

<select id="shop" class="form-select">

<option>N SHOP</option>

<option>M SHOP</option>

<option>MR SCR SHOP</option>

<option>CR SHOP</option>

<option>LIFTING BAY</option>

<option>J SHOP</option>

</select>

</div>

<div class="col-md-4">

<label>Column</label>

<select id="column" class="form-select"></select>

</div>

<div class="col-md-4">

<label>Position</label>

<select id="position" class="form-select">

<option>H1</option>

<option>H2</option>

<option>D2</option>

<option>D1</option>

</select>

</div>

</div>

<br>

<div class="row">

<div class="col-md-4">

<label>Coach Number</label>

<input
type="text"
id="coachNo"
class="form-control">

</div>

<div class="col-md-4">

<label>Coach Type</label>

<select id="coachType" class="form-select">

<option>LHB AC</option>

<option>LHB NAC</option>

<option>GS</option>

<option>SLR</option>

<option>RCC</option>

</select>

</div>

<div class="col-md-4">

<label>Status</label>

<select id="status" class="form-select">

<option>PO</option>

<option>LM</option>

<option>MED</option>

<option>RL</option>

</select>

</div>

</div>

<br>

<label>Remarks</label>

<textarea
id="remarks"
class="form-control"></textarea>

<br>

<button
class="btn btn-success"
onclick="saveCoach()">

💾 SAVE

</button>

<button
class="btn btn-warning"
onclick="updateCoach()">

✏ UPDATE

</button>

<button
class="btn btn-danger"
onclick="deleteCoach()">

🗑 DELETE

</button>

</div>

</div>

</div>

<script>

function saveCoach(){

let coach={

shop:shop.value,

column:column.value,

position:position.value,

coachNo:coachNo.value,

coachType:coachType.value,

status:status.value

};

let data=
JSON.parse(localStorage.getItem("CoachDB"))||[];

data.push(coach);

localStorage.setItem(
"CoachDB",
JSON.stringify(data)
);

alert("Coach Saved Successfully");

}

</script>

<script>
const shopColumns={

"N SHOP":[
"N2","N5","N7","N8"
],

"M SHOP":[
"M2","M3","M4","M5","M6"
],

"MR SCR SHOP":[
"SCR9","SCR10","SCR11","SCR12",
"SCR13","SCR14","SCR15","SCR16",
"SCR18","SCR19","SCR21","SCR22"
],

"CR SHOP":[
"F1","F2","F3","F4","F5",
"F6","F7","F8","F9","F10","F11"
],

"LIFTING BAY":[
"L9","L10"
],

"J SHOP":[
"J1","J2","J3","J4","J5","J6"
]

};

shop.onchange=function(){

column.innerHTML="";

shopColumns[this.value].forEach(function(c){

column.innerHTML+=
`<option>${c}</option>`;

});

};

shop.dispatchEvent(new Event("change"));
</script>
</body>
</html>
