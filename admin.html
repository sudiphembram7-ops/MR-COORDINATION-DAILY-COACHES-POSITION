<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>MR Admin Panel</title>

<link rel="stylesheet"
href="css/style.css">

<link rel="stylesheet"
href="css/admin.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-light">

<div class="container-fluid">

<div class="row">

<div class="col-12">

<div class="card shadow mt-3">

<div class="card-header bg-dark text-white">

<h2 class="text-center">

MR CO-ORDINATION ADMIN PANEL

</h2>

</div>

<div class="card-body">

<div class="row">

<div class="col-md-3">

<label>Shop</label>

<select
id="shop"
class="form-select">

<option>N SHOP</option>

<option>M SHOP</option>

<option>SCR SHOP</option>

<option>CR SHOP</option>

<option>J SHOP</option>

<option>LIFTING BAY</option>

</select>

</div>

<div class="col-md-3">

<label>Line</label>

<select
id="line"
class="form-select">

<option>SCR9</option>
<option>SCR10</option>
<option>SCR11</option>
<option>SCR12</option>
<option>SCR13</option>
<option>SCR14</option>
<option>SCR15</option>
<option>SCR16</option>
<option>SCR18</option>
<option>SCR19</option>
<option>SCR21</option>
<option>SCR22</option>

<option>F1</option>
<option>F2</option>
<option>F3</option>
<option>F4</option>
<option>F5</option>
<option>F6</option>
<option>F7</option>
<option>F8</option>
<option>F9</option>
<option>F10</option>
<option>F11</option>

<option>J1</option>
<option>J2</option>
<option>J3</option>
<option>J4</option>
<option>J5</option>
<option>J6</option>

<option>N2</option>
<option>N3</option>
<option>N5</option>
<option>N7</option>
<option>N8</option>

<option>M2</option>
<option>M3</option>
<option>M4</option>
<option>M5</option>
<option>M6</option>

<option>L9</option>
<option>L10</option>

</select>

</div>

<div class="col-md-2">

<label>Position</label>

<select
id="position"
class="form-select">

<option>H1</option>

<option>H2</option>

<option>D2</option>

<option>D1</option>

</select>

</div>

<div class="col-md-4">

<label>Coach Number</label>

<input
type="text"
id="coachNo"
class="form-control"
placeholder="Enter Coach Number">

</div>

</div>
<div class="row mt-3">

<div class="col-md-3">

<label>Status</label>

<select
id="status"
class="form-select">

<option>PO</option>

<option>LM</option>

<option>MED</option>

<option>RL</option>

<option>WIP</option>

<option>HOLD</option>

</select>

</div>

<div class="col-md-9 text-end">

<button
id="saveBtn"
class="btn btn-success">

SAVE

</button>

<button
id="updateBtn"
class="btn btn-primary">

UPDATE

</button>

<button
id="deleteBtn"
class="btn btn-danger">

DELETE

</button>

<button
onclick="location.href='board.html'"
class="btn btn-dark">

LIVE BOARD

</button>

</div>

</div>

<hr>

<h4>

Recent Coach Entry

</h4>

<table
class="table table-bordered">

<thead>

<tr>

<th>Shop</th>

<th>Line</th>

<th>Position</th>

<th>Coach</th>

<th>Status</th>

<th>Time</th>

</tr>

</thead>

<tbody
id="historyTable">

</tbody>

</table>

</div>

</div>

</div>

</div>

</div>

<script type="module" src="js/admin.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="js/admin.js"></script>
import { database } from "./firebase-config.js";

</body>

</html>
