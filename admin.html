<div class="container">

<div class="card">

<div class="card-header bg-primary text-white">

<h3>MR CO-ORDINATION ADMIN PANEL</h3>

</div>

<div class="card-body">

<div class="row">

<div class="col-md-4">

<label>Shop</label>

<select id="shop" class="form-select">

<option>N SHOP</option>

<option>M SHOP</option>

<option>MR SCR SHOP</option>

<option>CR SHOP</option>

<option>LIFTING BAY</option>

<option>J SHOP</option>

</select>

</div>

<div class="col-md-4">

<label>Column</label>

<select id="column" class="form-select"></select>

</div>

<div class="col-md-4">

<label>Position</label>

<select id="position" class="form-select">

<option>H1</option>

<option>H2</option>

<option>D2</option>

<option>D1</option>

</select>

</div>

</div>

<br>

<div class="row">

<div class="col-md-4">

<label>Coach Number</label>

<input
type="text"
id="coachNo"
class="form-control">

</div>

<div class="col-md-4">

<label>Coach Type</label>

<select id="coachType" class="form-select">

<option>LHB AC</option>

<option>LHB NAC</option>

<option>GS</option>

<option>SLR</option>

<option>RCC</option>

</select>

</div>

<div class="col-md-4">

<label>Status</label>

<select id="status" class="form-select">

<option>PO</option>

<option>LM</option>

<option>MED</option>

<option>RL</option>

</select>

</div>

</div>

<br>

<label>Remarks</label>

<textarea
id="remarks"
class="form-control"></textarea>

<br>

<button
class="btn btn-success"
onclick="saveCoach()">

💾 SAVE

</button>

<button
class="btn btn-warning"
onclick="updateCoach()">

✏ UPDATE

</button>

<button
class="btn btn-danger"
onclick="deleteCoach()">

🗑 DELETE

</button>

</div>

</div>

</div>
