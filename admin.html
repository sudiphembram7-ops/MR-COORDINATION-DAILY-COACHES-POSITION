<body>


<header class="header">

MR COACH COORDINATION ADMIN PANEL

<p>Liluah Workshop</p>

<div class="admin-box">


<h2>
Coach Entry Form
</h2>



<label>
Coach Number
</label>

<input 
type="text"
id="coachNo"
placeholder="Enter Coach No.">





<label>
Coach Type
</label>


<select id="coachType">

<option>LHB</option>
<option>ICF</option>
<option>MEMU</option>
<option>DEMU</option>

</select>





<label>
Shop Name
</label>


<select id="shop">


<option>N SHOP</option>

<option>M SHOP</option>

<option>SCR SHOP</option>

<option>CR SHOP</option>

<option>LIFTING BAY</option>

<option>J SHOP</option>


</select>





<label>
Status
</label>


<select id="status">


<option>READY</option>

<option>WORKING</option>

<option>HOLD</option>

<option>COMPLETE</option>


</select>





<label>
Priority
</label>


<select id="priority">


<option>Normal</option>

<option>Urgent</option>


</select>





<label>
SSE In-Charge
</label>


<input 
type="text"
id="sse"
placeholder="Enter SSE Name">





<label>
Expected Release Date
</label>


<input 
type="date"
id="releaseDate">






<label>
Remarks
</label>


<textarea 
id="remarks"
placeholder="Enter Remarks">

</textarea>





<button onclick="saveCoach()">

SAVE COACH

</button>



<button onclick="resetForm()">

RESET

</button>



<p id="message"></p>



</div>





<script src="js/admin.js"></script>


<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>


</body>

</html>
