<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coach History</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<h2>Coach Movement History</h2>

<input
type="text"
id="searchHistory"
placeholder="Search Coach Number">

<table id="historyTable">

<thead>

<tr>

<th>Date</th>
<th>Time</th>
<th>Shop</th>
<th>Column</th>
<th>Position</th>
<th>Coach No</th>
<th>Status</th>
<th>User</th>
<th>Action</th>

</tr>

</thead>

<tbody id="historyBody">


</tbody>

</table>
<script>
addHistory("NEW ENTRY", coach);
</script>
<script>
addHistory("UPDATED", coach);
</script>
<script>
addHistory("DELETED", coach);
</script>
<script>
function loadHistory(){

let history=
JSON.parse(localStorage.getItem("CoachHistory"))||[];

let html="";

history.forEach(function(h){

html+=`

<tr>

<td>${h.date}</td>

<td>${h.time}</td>

<td>${h.shop}</td>

<td>${h.column}</td>

<td>${h.position}</td>

<td>${h.coachNo}</td>

<td>${h.status}</td>

<td>${h.user}</td>

<td>${h.action}</td>

</tr>

`;

});

historyBody.innerHTML=html;

}

window.onload=loadHistory;
</script>
<script>
searchHistory.onkeyup=function(){

let filter=this.value.toUpperCase();

let rows=document.querySelectorAll("#historyTable tbody tr");

rows.forEach(function(r){

if(r.innerText.toUpperCase().includes(filter))

r.style.display="";

else

r.style.display="none";

});

}
</script>

</body>

</html>
