<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - MR Coach Coordination System</title>
<link rel="stylesheet" href="css/style.css">
<style>
.login-container{
max-width:420px;
margin:80px auto;
background:#fff;
padding:30px;
border-radius:10px;
border:3px solid #003366;
box-shadow:0 0 15px rgba(0,0,0,.2);
}
.login-container h2{
text-align:center;
color:#003366;
margin-bottom:25px;
}
.login-container label{
display:block;
margin-top:15px;
font-weight:bold;
}
.login-container input{
width:100%;
padding:12px;
margin-top:5px;
border:1px solid #ccc;
border-radius:5px;
font-size:16px;
}
.login-container button{
width:100%;
padding:12px;
margin-top:25px;
background:#003366;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
font-size:18px;
}
.login-container button:hover{
background:#ffcc00;
color:#000;
}
.error{
color:red;
text-align:center;
margin-top:15px;
}
</style>
</head>
<body>
<header class="header">
<h1>🇮🇳 INDIAN RAILWAYS</h1>
<h2>MR COORDINATION DAILY COACHES POSITION</h2>
<p>Liluah Workshop</p>
</header>
<div class="login-container">
<h2>Admin Login</h2>
<label>Username</label>
<input
type="text"
id="username"
placeholder="Enter Username">
<label>Password</label>
<input
type="password"
id="password"
placeholder="Enter Password">
<button onclick="firebaseLogin()">
Login
</button>
<p id="message" class="error"></p>
</div>
<script src="js/login.js"></script>
</body>
</html>
