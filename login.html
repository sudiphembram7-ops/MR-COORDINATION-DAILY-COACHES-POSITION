<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MR Coach Login</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<header>

<h1>🚆 MR Coach Coordination</h1>

<p>Login Panel</p>

</header>



<section class="login-box">


<h2>User Login</h2>


<input 
type="text" 
id="username" 
placeholder="Username">


<input 
type="password" 
id="password" 
placeholder="Password">


<button onclick="login()">
Login
</button>


<p id="message"></p>


</section>



<script src="js/login.js"></script>


</body>

</html>
