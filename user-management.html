<div class="admin-box">


<h2>Create New User</h2>


<label>Name</label>

<input id="userName"
placeholder="User Name">



<label>Email</label>

<input id="userEmail"
placeholder="Email Address">



<label>Password</label>

<input id="userPassword"
type="password"
placeholder="Password">



<label>Role</label>


<select id="userRole">


<option>Admin</option>

<option>Supervisor</option>

<option>Viewer</option>


</select>



<button onclick="createUser()">

CREATE USER

</button>



<p id="userMessage"></p>



</div>






<div class="admin-box">


<h2>User List</h2>


<table border="3" width="100%">


<thead>

<tr>

<th>Name</th>

<th>Email</th>

<th>Role</th>

<th>Action</th>

</tr>

</thead>


<tbody id="userTable">


</tbody>


</table>


</div>
