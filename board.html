<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MR Coach Coordination Daily Coaches Position</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#e9ecef;
}

/* Header */

.header{
    background:#003366;
    color:#fff;
    padding:15px;
    text-align:center;
    border-bottom:4px solid #ffc107;
}

.header h2{
    margin:0;
    font-weight:bold;
}

/* Toolbar */

.toolbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
    background:#ffffff;
    padding:12px 20px;
    box-shadow:0 2px 5px rgba(0,0,0,.2);
}

.left{
    font-weight:bold;
}

.right button{
    margin-left:6px;
}

/* Search */

.search-bar{
    padding:15px;
    background:#f8f9fa;
}

.search-bar input{
    width:100%;
    padding:12px;
    font-size:16px;
    border:2px solid #003366;
    border-radius:6px;
}

/* Shop Card */

.shop{
    margin:20px;
    background:#fff;
    border:3px solid #000;
}

.shop-title{
    background:#003366;
    color:white;
    text-align:center;
    padding:10px;
    font-size:20px;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:2px solid #000;
    padding:10px;
    text-align:center;
}

th{
    background:#d9d9d9;
}

.highlight{
    background:yellow !important;
}

@media(max-width:768px){

.toolbar{
    flex-direction:column;
    align-items:flex-start;
}

.right{
    width:100%;
}

.right button{
    width:100%;
    margin:5px 0;
}

}

</style>

</head>

<body>

<div class="header">
<h2>MR CO-ORDINATION DAILY COACHES POSITION</h2>
</div>

<div class="toolbar">

<div class="left">
Date: <span id="date"></span> |
Time: <span id="time"></span>
</div>

<div class="right">

<button class="btn btn-success">Excel</button>

<button class="btn btn-danger">PDF</button>

<button class="btn btn-primary" onclick="toggleFullscreen()">
Full Screen
</button>

</div>

</div>

<div class="search-bar">

<input
type="text"
id="searchBox"
placeholder="Search Coach Number...">

</div>

<script>

function updateClock(){

const now=new Date();

document.getElementById("date").innerHTML=
now.toLocaleDateString("en-GB");

document.getElementById("time").innerHTML=
now.toLocaleTimeString();

}

setInterval(updateClock,1000);

updateClock();

function toggleFullscreen(){

if(!document.fullscreenElement){

document.documentElement.requestFullscreen();

}else{

document.exitFullscreen();

}

}

</script>

</body>
</html>
