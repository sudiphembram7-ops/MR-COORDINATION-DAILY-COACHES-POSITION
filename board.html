<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
MR Coach Live Position Board
</title>


<link rel="stylesheet" href="css/style.css">


<style>

.board-title{

background:#003366;
color:white;
text-align:center;
padding:15px;

}


.board-container{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
padding:15px;

}



.shop-board{

background:white;
border:5px solid #003366;
border-radius:8px;
overflow:hidden;

}



.shop-board h2{

background:#003366;
color:white;
text-align:center;
padding:10px;

}



table{

width:100%;
border-collapse:collapse;
font-size:20px;

}



th{

background:#666;
color:white;
border:2px solid black;
padding:8px;

}



td{

border:2px solid black;
padding:8px;
text-align:center;
font-weight:bold;

}



.READY{

background:#00b050;
color:white;

}


.WORKING{

background:#ffc000;

}


.HOLD{

background:#ff0000;
color:white;

}


.COMPLETE{

background:#0070c0;
color:white;

}



.fullscreen-btn{

position:fixed;
right:20px;
top:20px;

padding:12px;

background:#ffcc00;
border:none;

cursor:pointer;

font-weight:bold;

}



@media(max-width:900px){

.board-container{

grid-template-columns:1fr;

}

}


</style>


</head>


<body>


<button class="fullscreen-btn"
onclick="openFullScreen()">

FULL SCREEN

</button>



<div class="board-title">


<h1>
🇮🇳 INDIAN RAILWAYS
</h1>


<h2>
MR COACH COORDINATION DAILY COACHES POSITION
</h2>


<p id="dateTime"></p>


</div>



<div id="board"
class="board-container">


</div>




<script src="js/app.js"></script>

<script src="js/board.js"></script>



</body>

</html>
